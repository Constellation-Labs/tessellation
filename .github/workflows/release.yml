on:
  push:
    branches:
      - release/testnet
      - release/integrationnet
      - release/mainnet

name: Release

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Release
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get commit message
        id: get_commit_message
        run: echo "COMMIT_MESSAGE=$(git log -1 --pretty=%B)" >> "$GITHUB_ENV"

      - name: Check for chore(release)
        id: check_commit_message
        run: |
          if [[ "$COMMIT_MESSAGE" == chore\(release\)* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java and scala
        if: steps.check_commit_message.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          JAVA_VERSION: openjdk@1.11.0
        uses: "./.github/templates/setup_java_and_scala"

      - name: Test
        if: steps.check_commit_message.outputs.skip == 'false'
        run: sbt 'scalafixAll --check --rules OrganizeImports;scalafmtCheckAll;test'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get the release version
        if: steps.check_commit_message.outputs.skip == 'false'
        id: get_version
        run: |
          {
            echo 'VERSION<<EOF'
            npx commit-and-tag-version --dry-run | grep -oP 'tagging release v\K[0-9]+\.[0-9]+\.[0-9]+'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build Changelog
        if: steps.check_commit_message.outputs.skip == 'false'
        id: get_changelog
        run: |
          {
            echo "CHANGELOG<<EOF"
            npx commit-and-tag-version --dry-run | sed -n '/---/,/---/p' | sed '1d;$d'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Set Git config
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Bump version.sbt and create release tag
        if: steps.check_commit_message.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          echo "Release-As: $VERSION" >> $GITHUB_STEP_SUMMARY

          echo "ThisBuild / version := \"$VERSION\"" > version.sbt
          git add version.sbt

          git commit -m "chore(release): $VERSION"
          git tag -a v$VERSION -m "Release $VERSION"

          git push origin ${{ github.ref }} -f
          git push origin v$VERSION -f

      - name: Assembly 🚀
        if: steps.check_commit_message.outputs.skip == 'false'
        run: sbt 'keytool/assembly;wallet/assembly;dagL0/assembly;dagL1/assembly'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy dependencies
        if: steps.check_commit_message.outputs.skip == 'false'
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          cp ./modules/keytool/target/scala-2.13/tessellation-keytool-assembly-$VERSION.jar ./cl-keytool.jar
          cp ./modules/wallet/target/scala-2.13/tessellation-wallet-assembly-$VERSION.jar ./cl-wallet.jar
          cp ./modules/dag-l0/target/scala-2.13/tessellation-dag-l0-assembly-$VERSION.jar ./cl-node.jar
          cp ./modules/dag-l1/target/scala-2.13/tessellation-dag-l1-assembly-$VERSION.jar ./cl-dag-l1.jar

      - name: Create release
        if: steps.check_commit_message.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          draft: true
          prerelease: false
          body: ${{ steps.get_changelog.outputs.CHANGELOG }}
          files: |
            ./cl-keytool.jar
            ./cl-wallet.jar
            ./cl-node.jar
            ./cl-dag-l1.jar
            ./mainnet/mainnet-seedlist
