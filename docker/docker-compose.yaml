version: '3.8'

services:
  global-l0:
    image: constellationnetwork/tessellation:${TESSELLATION_DOCKER_VERSION:-latest}
    container_name: global-l0${CONTAINER_NAME_SUFFIX:-}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CL_KEYSTORE=/tessellation/key.p12
    ports:
      - "${CL_DAG_L0_PUBLIC_PORT:-9000}:9000"  # Public HTTP
      - "${CL_DAG_L0_PEER_PORT:-9001}:9001"  # P2P HTTP
    volumes:
      - ${CL_KEYSTORE_MOUNT_PATH:-./key.p12}:/tessellation/key.p12
      # Only required for testing purposes
      - ${CL_GENESIS_FILE:-/dev/null}:/tessellation/genesis.csv
      # If using docker volumes:
      # - gl0-data:/tessellation/data
      # If using host volumes:
      - ${CL_L0_DATA_MOUNT_PATH:-./l0-data}:/tessellation/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/node/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tessellation-network
    profiles: ["l0"]

  dag-l1:
    image: constellationnetwork/tessellation:${TESSELLATION_DOCKER_VERSION:-latest}
    container_name: dag-l1${CONTAINER_NAME_SUFFIX:-}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CL_DAG_L1=true
      - CL_L0_PEER_HOST=${CL_L0_PEER_HOST:-global-l0}
      - CL_L0_PEER_HTTP_PORT=${CL_L0_PEER_HTTP_PORT:-9000}
      - CL_KEYSTORE=/tessellation/key.p12
    ports:
      - "${CL_DAG_L1_PUBLIC_PORT:-9010}:9010"  # Public HTTP
      - "${CL_DAG_L1_PEER_PORT:-9011}:9011"  # P2P HTTP
      - "${CL_DAG_L1_CLI_PORT:-9012}:9012"  # CLI
    volumes:
      - ${CL_KEYSTORE_MOUNT_PATH:-./key.p12}:/tessellation/key.p12
      # If using docker volumes:  
      # - dag-l1-data:/tessellation/data
      # If using host volumes:
      - ${CL_L1_DATA_MOUNT_PATH:-./l1-data}:/tessellation/data
    depends_on:
      global-l0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9010/node/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tessellation-network
  dag-l1-join-coordinator:
    image: alpine:latest
    container_name: dag-l1-join-coordinator-${CONTAINER_NAME_SUFFIX:-}
    env_file:
      - .env
    environment:
      - CL_DAG_L1_JOIN_IP=${CL_DAG_L1_JOIN_IP:-host.docker.internal}
      - CL_DAG_L1_JOIN_PORT=${CL_DAG_L1_JOIN_PORT:-9011}
      - CL_DAG_L1_JOIN_ID=${CL_DAG_L1_JOIN_ID:-}
      - CL_DAG_L1_CLI_PORT=${CL_DAG_L1_CLI_PORT:-9012}
      - CL_DAG_L1_JOIN_ENABLED=${CL_DAG_L1_JOIN_ENABLED:-true}
    command: >
      sh -c "
        apk --no-cache add curl

        sleep 15

        if [ "${CL_DAG_L1_JOIN_ENABLED}" = "true" ]; then
          curl -X POST \
          -H 'Content-Type: application/json' \
          -d '{\"id\":\"${CL_DAG_L1_JOIN_ID}\",\"ip\":\"${CL_DAG_L1_JOIN_IP}\",\"p2pPort\":${CL_DAG_L1_JOIN_PORT}}' \
          dag-l1:${CL_DAG_L1_CLI_PORT}/cluster/join
        fi

        # Keep the container running
        tail -f /dev/null
      "
    depends_on:
      global-l0:
        condition: service_healthy
      dag-l1:
        condition: service_healthy
    networks:
      - tessellation-network

# Use volumes for persistence as alternative to mounted file system storage
# volumes:
#   gl0-data:
#   dag-l1-data:

networks:
  tessellation-network:
    driver: bridge
